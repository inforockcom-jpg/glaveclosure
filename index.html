<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墓じまい・手元供養案内専門 ここから</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .portal-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f9f9f9;
            padding: 20px;
        }
        .portal-title {
            font-size: 2.5rem;
            color: var(--color-trust-blue);
            margin-bottom: 30px;
            text-align: center;
        }
        .region-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .region-card {
            background: white;
            padding: 30px 50px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-decoration: none;
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: bold;
            transition: transform 0.3s ease;
            text-align: center;
            min-width: 250px;
        }
        .region-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <h1 class="portal-title">墓じまい・手元供養案内専門「ここから」</h1>
        <p style="margin-bottom: 30px; font-size: 1.2rem;">対応エリアを選択してください</p>
        <div class="region-links">
            <a href="./hokkaido/" class="region-card">北海道エリア</a>
            <a href="./osaka/" class="region-card">大阪エリア</a>
        </div>
    </div>
</body>
</html>
