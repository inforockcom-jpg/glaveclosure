name: Deploy And Search Console

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_deploy_register:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Google verification file
        run: node ./scripts/google/generate-verification-file.mjs
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SITE_URL: ${{ vars.SITE_URL }}

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --dir=dist --prod --message "GitHub Actions deploy ${GITHUB_SHA}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Verify ownership and sync Search Console
        run: node ./scripts/google/ensure-search-console.mjs
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SITE_URL: ${{ vars.SITE_URL }}
          SITEMAP_URL: ${{ vars.SITEMAP_URL }}
